<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JGUXD All-Weather Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f0f4f8; }
        .calculator-container { max-width: 900px; background-color: #ffffff; border-radius: 1.5rem; box-shadow: 0 10px 25px rgba(0,0,0,0.1); padding: 2.5rem; }
        .asset-grid { display: grid; grid-template-columns: 2fr 1.5fr 1.5fr 1fr 0.2fr; gap: 1rem; align-items: center; }
        input[type="number"]::-webkit-outer-spin-button, input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input::placeholder { color: #9ca3af; font-style: italic; }
        @media (max-width: 768px) { .asset-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-[900px] mx-auto w-full">
        <header class="py-6"><h1 class="text-3xl font-bold text-gray-900">JGUXD All-Weather Calculator</h1></header>
        
        <main class="calculator-container">
            <div class="mb-8 p-4 bg-blue-50 rounded-lg flex flex-col sm:flex-row items-center justify-between gap-4">
                <label class="text-lg font-bold text-gray-700">Portfolio Total ($):</label>
                <input type="text" id="portfolioTotalDisplay" value="$100,000" 
                       class="text-2xl font-black text-blue-800 bg-transparent border-b-2 border-blue-200 focus:outline-none w-48 text-right" 
                       onfocus="convertToRaw(this)" onblur="formatPortfolioDisplay(this)">
            </div>

            <div class="flex justify-between items-center mb-4">
                <h2 class="text-2xl font-semibold">Your Asset Allocations</h2>
                <button onclick="addAsset()" class="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold hover:bg-blue-700">+ Add Asset</button>
            </div>

            <div class="asset-grid px-3 mb-2 text-xs font-bold text-gray-500 uppercase">
                <div>Asset Name</div>
                <div>Asset Type</div>
                <div>Amount ($)</div>
                <div class="text-center">Percentage (%)</div>
                <div></div>
            </div>

            <div id="userAssetsContainer" class="space-y-4"></div>

            <div class="mt-8 border-t pt-6">
                <table class="w-full text-left">
                    <thead><tr class="text-gray-600 uppercase text-xs border-b">
                        <th class="py-2">Category</th><th class="py-2">Target</th><th class="py-2">Actual</th><th class="py-2">Diff</th>
                    </tr></thead>
                    <tbody id="portfolioTableBody"></tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        const assetTypes = ["Stocks", "Long-term Bonds", "Intermediate Bonds", "Commodities", "Gold", "Crypto"];
        const targets = { "Stocks": 30, "Long-term Bonds": 40, "Intermediate Bonds": 15, "Commodities": 7.5, "Gold": 7.5, "Crypto": 0 };
        let assets = [{ name: "VOO", type: "Stocks", amount: 30000 }];

        function convertToRaw(el) {
            el.value = el.value.replace(/[^0-9]/g, '');
        }

        function formatPortfolioDisplay(el) {
            const val = parseFloat(el.value) || 0;
            el.value = '$' + val.toLocaleString();
            updateUI();
        }

        function formatAssetInput(el, idx) {
            const val = parseFloat(el.value.replace(/[^0-9]/g, '')) || 0;
            assets[idx].amount = val;
            el.value = val.toLocaleString();
            updateUI();
        }

        function updateUI() {
            const totalStr = document.getElementById('portfolioTotalDisplay').value;
            const total = parseFloat(totalStr.replace(/[^0-9]/g, '')) || 0;
            const container = document.getElementById('userAssetsContainer');
            
            container.innerHTML = '';
            assets.forEach((asset, idx) => {
                container.innerHTML += `
                    <div class="asset-grid bg-gray-50 p-3 rounded-lg border">
                        <input type="text" value="${asset.name}" placeholder="Asset Name/Symbol" class="border p-2 rounded w-full" onchange="assets[${idx}].name = this.value">
                        <select class="border p-2 rounded w-full" onchange="assets[${idx}].type = this.value; updateUI()">
                            ${assetTypes.map(t => `<option ${asset.type === t ? 'selected' : ''}>${t}</option>`).join('')}
                        </select>
                        <input type="text" value="${asset.amount.toLocaleString()}" class="border p-2 rounded w-full" 
                               onfocus="this.value = this.value.replace(/[^0-9]/g, '')" 
                               onblur="formatAssetInput(this, ${idx})">
                        <div class="text-center font-bold text-gray-700">${((asset.amount/total)*100 || 0).toFixed(1)}%</div>
                        <button onclick="assets.splice(${idx},1); updateUI()" class="text-red-400 font-bold">✕</button>
                    </div>`;
            });
            renderComparison(total);
        }

        function addAsset() {
            assets.push({ name: "", type: "Stocks", amount: 0 });
            updateUI();
        }

        function renderComparison(total) {
            const tbody = document.getElementById('portfolioTableBody');
            tbody.innerHTML = '';
            Object.entries(targets).forEach(([cat, target]) => {
                const actual = assets.filter(a => a.type === cat).reduce((sum, a) => sum + a.amount, 0);
                const actualPct = total > 0 ? (actual / total) * 100 : 0;
                tbody.innerHTML += `<tr>
                    <td class="py-2 text-sm">${cat}</td>
                    <td class="py-2 text-sm">${target}%</td>
                    <td class="py-2 text-sm">${actualPct.toFixed(1)}%</td>
                    <td class="py-2 text-sm font-bold ${actualPct - target >= -0.1 ? 'text-green-600' : 'text-red-600'}">
                        ${(actualPct - target).toFixed(1)}%
                    </td>
                </tr>`;
            });
        }

        updateUI();
    </script>
</body>
</html>
